name: CI_build

on: [push, pull_request]

jobs:
  build:

    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_configuration: [Release, Debug]
        build_platform: [x64, Win32, ARM64]

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: MSBuild of plugin dll
      working-directory: .\
      run: msbuild AI-Assistant.vcxproj /m /p:configuration="${{ matrix.build_configuration }}" /p:platform="${{ matrix.build_platform }}"

    - name: zip artifacts for ${{ matrix.build_platform }} Release
      if: matrix.build_configuration == 'Release'
      run: 7z a AI-Assistant_${{ github.ref_name }}_${{ matrix.build_platform }}.zip .\build\${{ matrix.build_platform }}\${{ matrix.build_configuration }}\plugins\AI-Assistant\AI-Assistant.dll

    - name: Archive artifacts for ${{ matrix.build_platform }}
      if: matrix.build_configuration == 'Release'
      uses: actions/upload-artifact@v7
      with:
          name: AI-Assistant_${{ github.ref_name }}_${{ matrix.build_platform }}.zip
          path: AI-Assistant_${{ github.ref_name }}_${{ matrix.build_platform }}.zip